<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Des P'tites Économies - Estimation Mobile</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#2D3748', secondary: '#4A5568', accent: '#4299E1', },
                    fontFamily: { display: ['Inter', 'sans-serif'], },
                }
            }
        }
        // Redirection vers desktop si écran très large
        if (window.innerWidth > 900) {
            window.location.href = 'estimation.html';
        }
    </script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.3s ease-in forwards;
        }

        .fade-out {
            animation: fadeOut 0.2s ease-out forwards;
        }

        .slide-in-right {
            animation: slideInRight 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        .slide-out-left {
            animation: slideOutLeft 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOutLeft {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(-100%);
                opacity: 0;
            }
        }

        /* Bottom Sheet */
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.15);
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            max-height: 80vh;
            overflow-y: auto;
        }

        .bottom-sheet.active {
            transform: translateY(0);
        }

        .bottom-sheet-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 99;
            backdrop-filter: blur(2px);
        }

        .bottom-sheet-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        /* Options Card Buttons */
        .option-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            background-color: white;
            border: 2px solid #E2E8F0;
            border-radius: 16px;
            font-weight: 600;
            color: #4A5568;
            transition: all 0.2s;
            text-align: left;
        }

        .option-btn:active {
            transform: scale(0.98);
            background-color: #F7FAFC;
        }

        .option-btn.selected {
            border-color: #6366F1;
            background-color: #EEF2FF;
            color: #4338CA;
        }

        /* Input Number Mobile */
        .number-input-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin: 24px 0;
        }

        .number-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-color: #EEF2FF;
            color: #4F46E5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.15);
        }

        .number-btn:active {
            transform: scale(0.95);
        }

        input[type="number"] {
            text-align: center;
            font-size: 32px;
            font-weight: 800;
            color: #3730A3;
            width: 100px;
            padding: 0;
            background: transparent;
            border: none;
            outline: none;
            -moz-appearance: textfield;
            appearance: textfield;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

<body class="bg-slate-50 flex flex-col min-h-[100dvh]">

            <div class="flex items-start gap-3">

                <p class="text-xs text-amber-800 font-medium">Ce simulateur estime la consommation
                    <strong>électrique</strong>. Le DPE réel peut différer pour les chauffages gaz, fioul ou bois.
                </p>
            </div>
        </div>

        <!-- Zone Question Animée -->
        <div id="questionContainer" class="flex-grow flex flex-col slide-in-right w-full">

            <div class="flex items-end gap-3 mb-6">
                <img src="Images/Image_6.png" alt="Watty"

                <div

                    <p id="questionText">Chargement de la question...</p>
                </div>

        </div>

            <span class="material-icons" style="font-size: 20px;">arrow_back</span> Retour

        <button id="nextButton" onclick="nextQuestionManual()"

            Continuer <span class="material-icons" style="font-size: 20px;">arrow_forward</span>
        </button>

            qContainer.classList.add('fade-in');

            qText.innerHTML = q.text;

            // Header/Progress Update
            const visibleQuestions = questions.filter(qu => !qu.condition || qu.condition(responses));
            const currentVisibleIndex = visibleQuestions.indexOf(q);
            const progress = ((currentVisibleIndex + 1) / visibleQuestions.length) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
            document.getElementById('progressText').textContent = `Question ${currentVisibleIndex + 1}/${visibleQuestions.length}`;

            // Avertissement visible que sur Q1
            if (index === 0) introAlert.classList.remove('hidden');
            else introAlert.classList.add('hidden');

            // Region badge visible si dep renseigné
            if (index > 0 && responses['departement']) {
                const reg = getRegionFromDept(responses['departement']);
                if (reg) {
                    regionName.textContent = REGION_LABELS[reg] || reg;
                    regionBadge.classList.replace('hidden', 'flex');
                }
            } else {
                regionBadge.classList.replace('flex', 'hidden');
            }

            // Mettre à jour la Bottom Sheet Help
            if (q.help) {
                helpText.innerHTML = q.help;
            } else {
                helpText.innerHTML = "Laissez-vous guider, c'est facile ! Répondez du mieux que vous pouvez. Sélectionnez 'Je ne sais pas' si vous avez un doute.";
            }

            rArea.innerHTML = '';
            nextBtn.classList.add('hidden');
            nextBtn.disabled = true;

            // Generate Input based on Type
            if (q.type === 'number') {
                nextBtn.classList.remove('hidden');
                let val = responses[q.id] || q.def;
                rArea.innerHTML = `
                    <div class="number-input-container">
                        <button class="number-btn" onclick="adjustNumber(-${q.step})"><span class="material-icons">remove</span></button>
                        <input type="number" id="numVal" value="${val}" min="${q.min}" max="${q.max}" step="${q.step}" onchange="saveNumberInput()" oninput="saveNumberInput()">
                        <button class="number-btn" onclick="adjustNumber(${q.step})"><span class="material-icons">add</span></button>
                    </div>
                `;
                responses[q.id] = val; // default set
                nextBtn.disabled = false;
            } else if (q.type === 'autocomplete') {
                nextBtn.classList.remove('hidden');
                let val = responses[q.id] || '';
                let optionsHtml = q.options.map(opt => `<option value="${opt.replace(/"/g, '&quot;')}">${opt}</option>`).join('');
                rArea.innerHTML = `
                    <div class="px-2 mt-2">
                        <input type="text" id="autoInput" list="depList" value="${val.replace(/"/g, '&quot;')}" placeholder="Ex: 75 - Paris" 
                            class="w-full bg-white border-2 border-indigo-200 text-indigo-700 font-bold text-center text-lg rounded-xl py-3 px-4 focus:border-indigo-500 focus:outline-none shadow-sm"
                            onchange="validateAutocomplete()" oninput="validateAutocomplete()">
                        <datalist id="depList">${optionsHtml}</datalist>
                    </div>
                `;
                validateAutocomplete(true);
            } else {
                // Boutons tactiles (Radio list)
                const opts = q.dynamicOptions ? (q.dynamicOptions(responses) || q.options) : q.options;
                opts.forEach(opt => {
                    const isSelected = responses[q.id] === opt;
                    const btn = document.createElement('button');
                    btn.className = `option-btn ${isSelected ? 'selected' : ''}`;
                    btn.innerHTML = `
                        <span>${opt}</span>
                        ${isSelected ? '<span class="material-icons text-[20px]">check_circle</span>' : '<span class="material-icons text-gray-300 text-[20px]">radio_button_unchecked</span>'}
                    `;
                    btn.onclick = () => selectOption(opt, btn);
                    rArea.appendChild(btn);
                });
            }

            // Bouton Précédent
            if (currentVisibleIndex > 0) prevBtn.classList.remove('hidden');
            else prevBtn.classList.add('hidden');
        }

        // =============================================
        // ACTIONS & NAVIGATION
        // =============================================

        // Pour les boutons radios
        function selectOption(val, btnElement) {
            const q = questions[currentQuestion];
            responses[q.id] = val;

            // UI Update local
            const allBtns = rArea.querySelectorAll('.option-btn');
            allBtns.forEach(b => {
                b.classList.remove('selected');
                b.querySelector('.material-icons').innerHTML = 'radio_button_unchecked';
                b.querySelector('.material-icons').className = 'material-icons text-gray-300 text-[20px]';
            });
            btnElement.classList.add('selected');
            btnElement.querySelector('.material-icons').innerHTML = 'check_circle';
            btnElement.querySelector('.material-icons').className = 'material-icons text-[20px]'; // keep default blue from selected parent

            // Auto advance after short delay
            setTimeout(() => nextQuestion(), 300);
        }

        // Pour l'autocomplete département
        function validateAutocomplete(init = false) {
            const q = questions[currentQuestion];
            const inp = document.getElementById('autoInput');
            if (!inp) return;
            const val = inp.value;
            if (q.options.includes(val)) {
                responses[q.id] = val;
                nextBtn.disabled = false;
            } else {
                delete responses[q.id];
                nextBtn.disabled = true;
            }
        }

        // Pour les nombres
        function adjustNumber(delta) {
            const inp = document.getElementById('numVal');
            if (!inp) return;
            let val = parseFloat(inp.value) || 0;
            const step = parseFloat(delta);
            const min = parseFloat(inp.min);
            const max = parseFloat(inp.max);

            let newVal = val + step;
            if (newVal < min) newVal = min;
            if (newVal > max) newVal = max;

            // Fix precision issues
            newVal = Math.round(newVal * 10) / 10;
            inp.value = newVal;
            saveNumberInput();
        }
        function saveNumberInput() {
            const q = questions[currentQuestion];
            const inp = document.getElementById('numVal');
            responses[q.id] = inp.value;
        }

        function nextQuestionManual() { if (!nextBtn.disabled) nextQuestion(); }

        function nextQuestion() {
            let nextIdx = currentQuestion + 1;
            while (nextIdx < questions.length) {
                const q = questions[nextIdx];
                if (!q.condition || q.condition(responses)) {
                    qContainer.classList.add('slide-out-left');
                    setTimeout(() => {
                        currentQuestion = nextIdx;
                        displayQuestion(currentQuestion);
                    }, 200);
                    return;
                }
                nextIdx++;
            }
            saveAndRedirect();
        }

        function previousQuestion() {
            let prevIdx = currentQuestion - 1;
            while (prevIdx >= 0) {
                const q = questions[prevIdx];
                if (!q.condition || q.condition(responses)) {
                    qContainer.classList.add('fade-out'); // go back doesn't slide left
                    setTimeout(() => {
                        currentQuestion = prevIdx;
                        displayQuestion(currentQuestion);
                    }, 150);
                    return;
                }
                prevIdx--;
            }
        }

        function saveAndRedirect() {
            const dataToSave = questions.map(q => ({
                label: q.label,
                value: responses[q.id] || 'Non renseigné'
            }));

            const region = getRegionFromDept(responses['departement']);
            if (region) {
                dataToSave.push({ label: 'Région', value: REGION_LABELS[region] || region });
                localStorage.setItem('dpe_region', region);
            }

            const surfaceKey = SURFACE_TO_KEY[responses['surface']] || null;
            if (surfaceKey) localStorage.setItem('dpe_surface_category', surfaceKey);

            localStorage.setItem('dpe_responses', JSON.stringify(dataToSave));

            // Animation finale avant redirection
            document.body.classList.add('fade-out');
            setTimeout(() => { window.location.href = 'recapitulatif.html'; }, 300);

        }

        // Inititalise UI
        displayQuestion(0);

    </script>
</body>

</html>
